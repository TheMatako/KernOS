# Workspace-level Cargo configuration.
# Target-specific settings are defined in each crate's own .cargo/config.toml.

[unstable]
# Recompile only the lowest Rust layers from scratch.
# Required for both bootloader and kernel since neither has an OS underneath.
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]

# Rustflags applied specifically when compiling for bare-metal x86_64.
# This only affects the kernel, not the bootloader (different target).
[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tkernel/kernel.ld",
    "-C", "relocation-model=static",
]